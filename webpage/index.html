<!DOCTYPE html>
<html ng-app="pyApp">
  <head>
    <meta charset="utf-8" />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Crystord</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div ng-controller="CreateElement">
      Title: <input type="text" ng-model="element_title" placeholder="Enter title here"/><br/>
      Label: <input type="text" ng-model="element_labels" placeholder="Add a label here"/><br/>
      Content: <input type="text" ng-model="element_content" placeholder="Add your Element content here"/><br/>

      <div>
        <button ng-click="create_element()">Create Element</button><br/>
      </div>

      Element ID: {{element_id}}<br/>
      Share Element Content: {{share_element_content}}<br/>
    </div>

    <br/><br/>

    <div ng-controller="GetElement">
      Element ID: <input type="text" ng-model="element_id" placeholder="Enter element ID here"/><br/>

      <div>
        <button ng-click="get_element_content()">Get Element</button><br/>
      </div>

      <div>{{element_content}}</div>

      <script type="text/javascript" src="script.js"></script>
    </div>

    <br/><br/>

    <div ng-controller="UpdateElement">
      Element ID: <input type="text" ng-model="element_id" placeholder="Enter element ID here"/><br/>
      Content: <input type="text" ng-model="element_content" placeholder="Add your Element content here"/><br/>

      <div>
        <button ng-click="update_element_content()">Update Element</button><br/>
      </div>
    </div>

    <div>
      <br><br><br><br><br><br><br><br>
      <h3>Support Crystord</h3>
      <form action="https://www.paypal.com/donate" method="post" target="_blank">
          <input type="hidden" name="hosted_button_id" value="WJCFEZSJP36EG">
          <input type="image" src="https://www.paypalobjects.com/en_US/i/btn/btn_donateCC_LG.gif" border="0" name="submit" title="PayPal - The safer, easier way to pay online!" alt="Donate with PayPal button">
          <img alt="" border="0" src="https://www.paypal.com/en_US/i/scr/pixel.gif" width="1" height="1">
      </form>
    </div>
  </body>
</html>
