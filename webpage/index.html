<!DOCTYPE html>
<html ng-app="pyApp">
  <head>
    <meta charset="utf-8" />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Crystord</title>
  </head>

  <body>
    <div ng-controller="pyController">
      Title: <input type="text" ng-model="element_title"/><br/>
      Labels: <input type="text" ng-model="element_labels"/><br/>
      Content: <input type="text" ng-model="element_content"/><br/>

      <div>
        <button ng-click="create_unitbase()">Create Element</button><br/>
      </div>

      <div>{{r}}</div>

      <script type="text/javascript" src="script.js"></script>
    </div>
  </body>
</html>
