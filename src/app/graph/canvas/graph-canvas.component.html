<div
	#canvasRef
	class="graph-canvas"
	(pointerdown)="onCanvasPointerDown($event)"
	(document:pointermove)="onPointerMove($event)"
	(document:pointerup)="onPointerUp($event)"
	(wheel)="onWheel($event)"
>
		<svg class="graph-canvas__links">
			<g [attr.transform]="'translate(' + viewport.x + ',' + viewport.y + ') scale(' + viewport.scale + ')'"><!-- world space -->
		<defs>
			<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
				<polygon points="0 0, 10 3.5, 0 7" fill="var(--cui-primary, #3f8cff)" />
			</marker>
			<marker id="arrowhead-preview" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
				<polygon points="0 0, 10 3.5, 0 7" fill="var(--cui-primary, #3f8cff)" opacity="0.6" />
			</marker>
		</defs>
		<ng-container *ngFor="let connection of connections">
			<path
				class="graph-canvas__link"
				[attr.d]="buildConnectionPath(connection)"
				marker-end="url(#arrowhead)"
			></path>
		</ng-container>
		<path
			*ngIf="dragConnection"
			class="graph-canvas__link graph-canvas__link--preview"
			[attr.d]="buildDragPath()"
			marker-end="url(#arrowhead-preview)"
		></path>
			</g>
		</svg>

		<div class="graph-world" [style.transform]="'translate(' + viewport.x + 'px,' + viewport.y + 'px) scale(' + viewport.scale + ')'">
			<div
				class="graph-node"
				*ngFor="let node of nodes; index as i; trackBy: trackNode"
				[style.left.px]="node.x"
				[style.top.px]="node.y"
				[class.graph-node--selected]="i === selectedIndex"
				(pointerdown)="onNodePointerDown($event, i)"
				(pointerup)="onNodePointerUp()"
			>
				<df-node-arithmetic
					[title]="node.data.title"
					[content]="node.data.content"
					[operator]="node.data.operator || ''"
          [isDirty]="!!node.data.isDirty"
					[selected]="i === selectedIndex"
					(titleChange)="onNodeTitleChange(node.id, $event)"
					(contentChange)="onNodeContentChange(node.id, $event)"
					(portPointerDown)="onPortPointerDown($event, i)"
					(portPointerEnter)="onPortPointerEnter($event, i)"
					(portPointerLeave)="onPortPointerLeave($event, i)"
				></df-node-arithmetic>
			</div>
		</div>

		<!-- Zoom controls -->
		<div class="graph-zoom-controls">
			<button class="graph-zoom-btn" type="button" (click)="zoomIn()">+</button>
			<button class="graph-zoom-btn" type="button" (click)="zoomOut()">−</button>
		</div>
</div>
