<div class="df-node df-node--arithmetic" [class.df-node--selected]="selected">
  <span class="df-node__port df-node__port--in" title="input"></span>
  <span class="df-node__port df-node__port--out" title="output"></span>

  <div class="df-node__content">
    <div class="df-node__title-row">
      <input
        [id]="titleInputId"
        type="text"
        class="df-node__title-input"
        [value]="title"
        (input)="onTitleChange($any($event.target).value)"
        placeholder="Title"
      />
    </div>
    <div class="df-node__body">
      <label class="df-node__label" [attr.for]="contentInputId">Content</label>
      <input
        [id]="contentInputId"
        type="text"
        class="df-node__input"
        [value]="content"
        (input)="onContentChange($any($event.target).value)"
        placeholder="Enter content..."
      />
    </div>
  </div>
</div>
