<div class="df-node df-node--arithmetic" [class.df-node--selected]="selected" [class.df-node--dirty]="isDirty">
  <span
    #inputPort
    class="df-node__port df-node__port--in"
    title="input"
    (pointerdown)="handlePortPointerDown($event, 'input', 'default')"
    (pointerenter)="handlePortPointerEnter('input', 'default')"
    (pointerleave)="handlePortPointerLeave('input', 'default')"
  ></span>
  <span
    #outputPort
    class="df-node__port df-node__port--out"
    title="output"
    (pointerdown)="handlePortPointerDown($event, 'output', 'default')"
    (pointerenter)="handlePortPointerEnter('output', 'default')"
    (pointerleave)="handlePortPointerLeave('output', 'default')"
  ></span>

  <div class="df-node__content">
    <div class="df-node__title-row">
      <input
        [id]="titleInputId"
        type="text"
        class="df-node__title-input"
        [value]="title"
        (input)="onTitleInput($any($event.target).value)"
        (blur)="onTitleBlur()"
        placeholder="Title"
      />
    </div>

    <!-- Operator badge in center -->
    <div class="df-node__operator" *ngIf="operator && getOperatorSymbols()">
      <span class="badge bg-secondary">{{ getOperatorSymbols() }}</span>
    </div>
    <!-- Fallback: show raw operator if no symbols parsed -->
    <div class="df-node__operator" *ngIf="operator && !getOperatorSymbols()">
      <span class="badge bg-secondary">{{ operator }}</span>
    </div>

    <div class="df-node__body">
      <div class="df-node__input-group">
        <span class="df-node__input-label">Content</span>
        <input
          [id]="contentInputId"
          type="text"
          class="df-node__input-field"
          [value]="content"
          (input)="onContentInput($any($event.target).value)"
          (blur)="onContentBlur()"
          placeholder=""
        />
      </div>
    </div>
  </div>
</div>
