<!--sidebar-->
<c-sidebar
  #sidebar1="cSidebar"
  class="d-print-none sidebar sidebar-fixed border-end"
  colorScheme="dark"
  id="sidebar1"
  visible
  narrow
>
  <c-sidebar-header class="border-bottom">
    <c-sidebar-brand [routerLink]="[]">
      <!-- <svg [class]="{icon: false}" cIcon class="sidebar-brand-full" height="32" name="logo" title="CoreUI Logo"></svg> -->
      <img src="assets/logo_short.png" class="sidebar-brand-full" height="32" alt="Logo">
      <img src="assets/logo_short.png" class="sidebar-brand-narrow" height="32" alt="Logo">
    </c-sidebar-brand>
  </c-sidebar-header>

  <div class="sidebar-profile border-bottom d-flex align-items-center justify-content-center px-3 py-2">
    <ng-container *ngTemplateOutlet="userDropdown" />
  </div>

  <ng-scrollbar #scrollbar="ngScrollbar" (updated)="onScrollbarUpdate(scrollbar.state)" class="overflow" pointerEventsMethod="scrollbar" visibility="hover">
  <c-sidebar-nav #overflow [navItems]="navItems" dropdownMode="path" compact />
  </ng-scrollbar>
  <c-sidebar-footer class="border-top d-none d-lg-flex">
    <c-dropdown alignment="start" variant="nav-item">
      <button [caret]="false" cDropdownToggle aria-label="Open theme picker" class="btn btn-link p-1">
        <svg cIcon [name]="icons()" size="lg"></svg>
      </button>
      <div cDropdownMenu>
        @for (mode of colorModes; track mode.name) {
          <button
            (click)="colorMode.set(mode.name)"
            [active]="colorMode()===mode.name"
            [routerLink]="[]"
            cDropdownItem
            class="d-flex align-items-center"
          >
            <svg cIcon class="me-2" [name]="mode.icon" size="lg"></svg>
            {{ mode.text }}
          </button>
        }
      </div>
    </c-dropdown>
  </c-sidebar-footer>
</c-sidebar>

<!--main-->
<div class="wrapper d-flex flex-column min-vh-100">
  <!--app-header-->
  <app-default-header
    [cShadowOnScroll]="'sm'"
    class="mb-4 d-print-none header header-sticky p-0 shadow-sm"
    position="sticky"
    sidebarId="sidebar1"
  />
  <!--app-body-->
  <div class="body flex-grow-1">
    <!-- Full width for control overview with responsive padding -->
    <div *ngIf="isFullWidthRoute" class="h-auto full-width-content">
      <router-outlet />
    </div>
    <!-- Container for other routes -->
    <c-container *ngIf="!isFullWidthRoute" breakpoint="lg" class="h-auto px-4">
      <router-outlet />
    </c-container>
  </div>
  <!--app footer-->
  <app-default-footer />
</div>

        [size]="'md'"
        src="./assets/images/avatars/0.jpg"
        status="success"
        textColor="primary"
        alt="User avatar"
      />
