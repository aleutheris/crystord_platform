<!--<c-header class="mb-4 d-print-none" position="sticky">-->
<ng-container>
  <c-container [fluid]="true" class="border-bottom px-4">
    <button
      [cSidebarToggle]="sidebarId"
      cHeaderToggler
      class="btn"
      toggle="visible"
      style="margin-inline-start: -14px;"
      aria-label="Toggle sidebar navigation">
      <svg cIcon name="cilMenu" size="lg"></svg>
    </button>

      <div class="alert alert-warning text-center mb-0 border-0 rounded-0" role="alert">
        <strong>Crystord is currently in its beta phase and may contain bugs or unexpected behavior. We recommend using it with caution and avoiding sensitive or critical data during this testing period.</strong>
      </div>

    <c-header-nav class="ms-auto ms-md-0">
      <div class="nav-item py-1">
        <div class="h-100 mx-2 text-body text-opacity-75"></div>
      </div>
    </c-header-nav>
  </c-container>
</ng-container>

<ng-template #userDropdown>
  <c-dropdown [popperOptions]="{ placement: 'bottom-start' }" variant="nav-item">
    <button [caret]="false" cDropdownToggle class="py-0 pe-0" aria-label="Open user menu">
      <c-avatar
        shape="rounded-1"
        [size]="'md'"
        src="./assets/images/avatars/0.jpg"
        status="success"
        textColor="primary"
        alt="User avatar"
      />
    </button>
  </c-dropdown>
</ng-template>
