<c-row>
  <c-col xs="12">
    <c-card class="mb-4">
      <c-card-header ngPreserveWhitespaces>
        <strong>Atom Features</strong> <small></small>
      </c-card-header>
      <c-card-body>
        <p class="text-body-secondary small">
          Get and update your Atom.
        </p>
          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Atom ID</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.entries.uuid"/>
            <button cButton
              color="secondary"
              id="button-addon2"
              type="button"
              variant="outline"
              (click)="getAllAtomFeatures()">
              Get Atom
            </button>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Stored At</span>
            <span cInputGroupText id="basic-addon1">{{ atom.properties.entries.storedAt }}</span>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Labels</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.labels"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Bonds</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.bonds"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Title</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.nuclearies.title"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Description</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.nuclearies.description"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Content</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.nuclearies.content"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Operation</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.nuclearies.operation"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Constants</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.nuclearies.constants"/>
          </c-input-group>

          <button cButton
            color="secondary"
            id="inputGroupFileAddon03"
            type="button"
            variant="outline"
            (click)="updateAtomNuclearies()">
            Update Atom
          </button>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>

<c-row>
  <c-col xs="12">
    <c-card class="mb-4">
      <c-card-header ngPreserveWhitespaces>
        <strong>Create</strong> <small></small>
      </c-card-header>
      <c-card-body>
        <p class="text-body-secondary small">
          Control atoms menu.
        </p>
          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Title</span>
            <input aria-describedby="basic-addon1"
                   aria-label="Title"
                   cFormControl
                   placeholder="Write Atom's title here."
                   [(ngModel)]="newAtom.properties.nuclearies.title"
            />
          </c-input-group>
          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Labels</span>
            <input aria-describedby="basic-addon1"
              aria-label="Labels"
              cFormControl
              placeholder="Write Atom's labels here."
              [(ngModel)]="newAtom.labels"
              [ngModelOptions]="{ standalone: true }"
              (ngModelChange)="newAtom.labels = $event.split(',')"
            />
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Atom ID</span>
            <span cInputGroupText id="basic-addon1">{{ this.atomId }}</span>
          </c-input-group>

          <button cButton
            color="secondary"
            id="inputGroupFileAddon03"
            type="button"
            variant="outline"
            (click)="createAtom()">
            Create Atom
          </button>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
