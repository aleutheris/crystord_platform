<c-row>
  <c-col xs="12">
    <c-card class="mb-4">
      <c-card-header ngPreserveWhitespaces>
        <strong>Atom Features</strong> <small></small>
      </c-card-header>
      <c-card-body>
        <!-- <p class="text-body-secondary small">
          Create an atom.
        </p> -->
          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Atom ID</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atomId"/>
            <button cButton
              color="secondary"
              id="button-addon2"
              type="button"
              variant="outline"
              (click)="getAtomAll(atomId)">
              Get Atom
            </button>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Labels</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.labels"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Title</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.nuclearies.title"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Description</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.nuclearies.description"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Content</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.nuclearies.content"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Operation</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.nuclearies.operation"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText id="basic-addon1">Constants</span>
            <input aria-describedby="basic-addon1"
                   aria-label="id"
                   cFormControl
                   placeholder=""
                   [(ngModel)]="atom.properties.nuclearies.constants"/>
          </c-input-group>

          <button cButton
            color="secondary"
            id="inputGroupFileAddon03"
            type="button"
            variant="outline">
            Update Atom
          </button>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
