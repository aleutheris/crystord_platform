<c-row>
  <c-col xs="12">
    <c-card class="mb-4">
      <c-card-header>
        <strong>Overview</strong>
      </c-card-header>
      <c-card-body>
        <input aria-label="default input example"
          cFormControl
          placeholder="Search..."
          type="text"
          [(ngModel)]="searchText"
          (keyup.enter)="retrieveAtomsFeatures()"/>

          <table cTable>
            <thead>
              <tr>
                <th scope="col">Title</th>
                <th scope="col">Description</th>
                <th scope="col">Content</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let atom of atomsFeatures">
                <td>{{ atom.properties.nuclearies.title }}</td>
                <td>{{ atom.properties.nuclearies.description }}</td>
                <td>{{ atom.properties.nuclearies.content }}</td>
              </tr>
            </tbody>
          </table>

        <div id="konva-container"></div>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
