
<c-row>
  <c-col xs="12">
    <c-card class="mb-4">
  <c-card-body class="position-relative" style="padding-top: 70px; --graph-controls-height: 70px;">
        <!-- Top controls: Rearrange button and Search Bar -->
        <div style="position: absolute; top: 0; left: 0; width: 100%; z-index: 10; display: flex; gap: 1rem; align-items: center; padding: 10px; background: transparent;">
          <input [valid]="isSearchTextValid" aria-label="default input example"
            cFormControl
            placeholder="Search..."
            type="text"
            [(ngModel)]="searchText"
            (keyup.enter)="retrieveAtomsFeatures()"
            style="flex: 1; min-width: 200px; max-width: 100%;"/>
          <button
            cButton
            color="success"
            type="button"
            variant="outline"
            (click)="retrieveAtomsFeatures()"
            aria-label="Run Search"
            style="margin-left: auto; margin-right: 0.5rem;">
            <svg cIcon name="cil-media-play" size="lg"></svg>
          </button>

          <button
            cButton
            color="secondary"
            type="button"
            variant="outline"
            (click)="saveGraph()"
            aria-label="Save">
            <svg cIcon name="cil-save" size="lg"></svg>
          </button>
        </div>


        <!-- Right Sidebar for Graph Controls -->
        <app-graph-right-sidebar
          [visible]="rightSidebarVisible"
          [config]="rightSidebarConfig"
          (toggleEvent)="onRightSidebarToggle($event)"
          (visibleChange)="rightSidebarVisible = $event">
        </app-graph-right-sidebar>

        <div style="height: 500px; margin-top: 10px;">
          <app-graph-canvas [nodes]="demoNodes"></app-graph-canvas>
        </div>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>

<c-row>
  <c-col xs="12">
    <c-card class="mb-4">
      <c-card-header>
        <strong>List</strong>
      </c-card-header>
      <c-card-body [ngStyle]="{ 'white-space': 'nowrap', 'overflow': 'auto' }">
        <table [hover]="true" cTable>
          <thead>
            <tr>
              <th scope="col"></th>
              <th scope="col">Title</th>
              <th scope="col">Operation</th>
              <th scope="col">Bonds</th>
              <th scope="col">UUID</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let atom of atomsFeaturesTexted; let i = index" (click)="searchClickedAtom(atom)">
              <td>
                <button cButton
                  color="primary"
                  id="inputGroupFileAddon03"
                  type="button"
                  variant="outline"
                  (click)="updateAtomFeatures(i)">
                  Update
                </button>
              </td>
              <td>{{ atom.properties.nuclearies.title }}</td>
              <td>
                <input aria-label="default input example"
                  cFormControl
                  placeholder="add operation"
                  type="text"
                  [(ngModel)]="atom.properties.nuclearies.operation"
                  [ngStyle]="{ 'min-width': '200px', 'max-width': '400px' }"/>
              </td>
              <td>
                <span *ngFor="let bond_name of atom.bonds" class="badge bg-secondary rounded-pill me-1">{{ bond_name }}</span>
              </td>
              <td>{{ atom.properties.shellies.uuid }}</td>
            </tr>
          </tbody>
        </table>
      </c-card-body>
    </c-card>
  </c-col>
</c-row>
