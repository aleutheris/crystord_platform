<div class="graph-right-sidebar-container" [style.width]="currentWidth">
  <c-sidebar
    #rightSidebar="cSidebar"
    class="graph-right-sidebar"
    colorScheme="dark"
    [style.width]="currentWidth"
    [visible]="visible"
    position="fixed">

    <c-sidebar-header class="border-bottom d-flex align-items-center gap-2">
      <span *ngIf="isExpanded" class="sidebar-title me-auto">{{ config.title }}</span>

      <div *ngIf="isExpanded" class="d-flex gap-2">
        <button
          cButton
          color="primary"
          type="button"
          variant="outline"
          (click)="onCleanButtonClick()"
          aria-label="Clean Sidebar">
          Clean
        </button>
        <button
          cButton
          color="success"
          type="button"
          variant="outline"
          (click)="onFormButtonClick()"
          [disabled]="!canFormAtom()"
          aria-label="Form New Atom">
          Form
        </button>
        <button
          cButton
          color="primary"
          type="button"
          variant="outline"
          (click)="destroyAtoms()"
          aria-label="Destroy Atom">
          Destroy
        </button>
      </div>

      <button
        type="button"
        class="btn btn-sm btn-ghost-light sidebar-toggle-btn ms-1"
        (click)="toggleSidebar()"
        [attr.aria-label]="isExpanded ? 'Collapse sidebar' : 'Expand sidebar'">
        <svg cIcon
             [name]="isExpanded ? 'cilChevronRight' : 'cilChevronLeft'"
             size="sm">
        </svg>
      </button>
    </c-sidebar-header>

    <div class="sidebar-content" *ngIf="isExpanded">
      <ng-content></ng-content>

      <ng-container *ngIf="!hasProjectedContent">
        <div class="p-3">
          <c-input-group class="mb-3 labels-input-group">
            <span cInputGroupText>Labels</span>
            <div class="form-control label-chip-input d-flex flex-wrap align-items-center gap-2">
              <span
                *ngFor="let label of atomForUpdate.labels; let i = index"
                class="badge bg-secondary d-inline-flex align-items-center gap-1 label-chip">
                <span class="label-text">{{ label }}</span>
                <button
                  type="button"
                  class="btn btn-sm btn-ghost-light text-white px-1 py-0 label-chip-remove"
                  (click)="removeLabel(i)"
                  [attr.aria-label]="'Remove label ' + label">
                  &times;
                </button>
              </span>
              <input
                type="text"
                class="chip-text-input flex-grow-1"
                placeholder=""
                autocomplete="off"
                [(ngModel)]="labelInputValue"
                [ngModelOptions]="{ standalone: true }"
                (keydown)="onLabelInputKeydown($event)"
                (blur)="onLabelInputBlur()"
                (paste)="onLabelInputPaste($event)"/>
            </div>
          </c-input-group>

          <!-- Bonds -->
          <c-input-group class="mb-3">
            <span cInputGroupText>Bonds</span>
            <div class="d-flex flex-wrap gap-1 p-2 border rounded">
              <span *ngFor="let bond of atomForUpdate.bonds" class="badge bg-secondary">{{ bond.name }}</span>
            </div>
          </c-input-group>

          <!-- Title -->
          <c-input-group class="mb-3">
            <span cInputGroupText>Title</span>
            <input
              cFormControl
              placeholder=""
              [(ngModel)]="atomForUpdate.properties.nuclearies.title"
              (blur)="onFieldBlur()"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText>Content</span>
            <input
              *ngIf="!atomForUpdate.properties.nuclearies.content.includes('\n')"
              cFormControl
              placeholder=""
              [(ngModel)]="atomForUpdate.properties.nuclearies.content"
              (blur)="onFieldBlur()"/>
            <textarea
              *ngIf="atomForUpdate.properties.nuclearies.content.includes('\n')"
              cFormControl
              placeholder=""
              [(ngModel)]="atomForUpdate.properties.nuclearies.content"
              (blur)="onFieldBlur()"
              style="height: 150px;">
            </textarea>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText>Operation</span>
            <c-dropdown class="input-group-dropdown d-flex">
              <button
                cButton
                cDropdownToggle
                variant="outline"
                class="border-0 border-end h-100">
                {{ selectedOperationType || '--' }}
              </button>
              <ul cDropdownMenu>
                <li><button cDropdownItem (click)="onOperationTypeChange('add')">add</button></li>
                <li><button cDropdownItem (click)="onOperationTypeChange('sub')">sub</button></li>
                <li><button cDropdownItem (click)="onOperationTypeChange('mult')">mult</button></li>
                <li><button cDropdownItem (click)="onOperationTypeChange('div')">div</button></li>
              </ul>
            </c-dropdown>
            <input
              *ngIf="!(atomForUpdate.properties.nuclearies.operation ?? '').includes('\n')"
              cFormControl
              placeholder=""
              [(ngModel)]="atomForUpdate.properties.nuclearies.operation"
              (blur)="onFieldBlur()"/>
            <textarea
              *ngIf="(atomForUpdate.properties.nuclearies.operation ?? '').includes('\n')"
              cFormControl
              placeholder=""
              [(ngModel)]="atomForUpdate.properties.nuclearies.operation"
              (blur)="onFieldBlur()"
              style="height: 150px;">
            </textarea>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText>Description</span>
            <input
              cFormControl
              placeholder=""
              [(ngModel)]="atomForUpdate.properties.nuclearies.description"
              (blur)="onFieldBlur()"/>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText>Constants</span>
            <input
              *ngIf="!getConstantsAsString().includes('\n')"
              cFormControl
              placeholder=""
              [(ngModel)]="atomForUpdate.properties.nuclearies.constants"
              (blur)="onFieldBlur()"/>
            <textarea
              *ngIf="getConstantsAsString().includes('\n')"
              cFormControl
              placeholder=""
              [(ngModel)]="atomForUpdate.properties.nuclearies.constants"
              (blur)="onFieldBlur()"
              style="height: 150px;">
            </textarea>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText>Stored At</span>
            <span cInputGroupText>{{ atomForUpdate.properties.shellies.changeHistory }}</span>
          </c-input-group>

          <c-input-group class="mb-3">
            <span cInputGroupText>Atom UUID</span>
            <input
              cFormControl
              placeholder=""
              [(ngModel)]="atomForUpdate.properties.shellies.uuid"/>
            <button
              cButton
              color="primary"
              type="button"
              variant="outline"
              (click)="retrieveAtomFeatures()">
              Get Atom
            </button>
          </c-input-group>
        </div>
      </ng-container>
    </div>

    <!-- Collapsed state content -->
    <div class="sidebar-collapsed-content" *ngIf="!isExpanded">
      <div class="d-flex flex-column align-items-center p-2">
        <!-- Icon-only button for atom creation -->
        <button type="button" class="btn btn-ghost-light btn-sm mb-2" title="Atom Features">
          <svg cIcon name="cilPlus" size="sm"></svg>
        </button>
      </div>
    </div>

  </c-sidebar>
</div>
