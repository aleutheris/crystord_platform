<!-- Right Sidebar for Graph Controls -->
<div class="graph-right-sidebar-container" [style.width]="currentWidth">
  <!-- Sidebar -->
  <c-sidebar
    #rightSidebar="cSidebar"
    class="graph-right-sidebar"
    colorScheme="dark"
    [style.width]="currentWidth"
    [visible]="visible"
    position="fixed">

    <!-- Header with title and toggle button -->
    <c-sidebar-header class="border-bottom d-flex justify-content-between align-items-center">
      <span *ngIf="isExpanded" class="sidebar-title">{{ config.title }}</span>
      <button
        type="button"
        class="btn btn-sm btn-ghost-light sidebar-toggle-btn"
        (click)="toggleSidebar()"
        [attr.aria-label]="isExpanded ? 'Collapse sidebar' : 'Expand sidebar'">
        <svg cIcon
             [name]="isExpanded ? 'cilChevronRight' : 'cilChevronLeft'"
             size="sm">
        </svg>
      </button>
    </c-sidebar-header>

    <!-- Content Area -->
    <div class="sidebar-content" *ngIf="isExpanded">
      <!-- Projected Content -->
      <ng-content></ng-content>

      <!-- Default Content if no content projected -->
      <ng-container *ngIf="!hasProjectedContent">
        <div class="p-3">
          <!-- Mode Selector Dropdown -->
          <div class="mb-3">
            <c-dropdown class="d-grid">
              <button
                cButton
                cDropdownToggle
                variant="outline"
                size="sm"
                class="w-100">
                {{ currentModeLabel }}
              </button>
              <ul cDropdownMenu class="w-100">
                <li *ngFor="let option of modeOptions">
                  <button
                    cDropdownItem
                    (click)="onModeChange(option.value)"
                    [class.active]="currentMode === option.value">
                    {{ option.label }}
                  </button>
                </li>
              </ul>
            </c-dropdown>
          </div>

          <!-- Dynamic Content Based on Mode -->
          <div [ngSwitch]="currentMode">
            <!-- Create Atom Mode -->
            <div *ngSwitchCase="SidebarMode.CREATE_ATOM">

              <!-- Create Atom Button (with same container and style as Update buttons) -->
              <div class="d-grid gap-2 d-md-flex justify-content-md-start mb-3">
                <button
                  cButton
                  color="primary"
                  type="button"
                  variant="outline"
                  (click)="formAtoms()"
                  [disabled]="!isCreateAtomButtonEnabled">
                  Create Atom
                </button>
              </div>

              <!-- Atom Creation Form -->
              <c-input-group class="mb-3">
                <span cInputGroupText>Title</span>
                <input
                  cFormControl
                  placeholder="Write Atom's title here."
                  [(ngModel)]="newAtom.properties.nuclearies.title"/>
              </c-input-group>

              <c-input-group class="mb-3">
                <span cInputGroupText>Labels</span>
                <input
                  cFormControl
                  placeholder="Write Atom's labels here."
                  [(ngModel)]="newAtom.labels"
                  [ngModelOptions]="{ standalone: true }"
                  (ngModelChange)="newAtom.labels = $event.split(',')"/>
              </c-input-group>

              <!-- Atom UUID (only show after creation) -->
              <c-input-group class="mb-3" *ngIf="shouldShowUuid">
                <span cInputGroupText>Atom UUID</span>
                <span cInputGroupText class="text-muted">{{ newAtom.properties.shellies.uuid }}</span>
              </c-input-group>
            </div>

            <!-- Update Atom Mode - Complete Atom Features (copied from control.detail) -->
            <div *ngSwitchCase="SidebarMode.UPDATE_ATOM">

              <!-- Atom UUID with Get Button -->
              <c-input-group class="mb-3">
                <span cInputGroupText>Atom UUID</span>
                <input
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.properties.shellies.uuid"/>
                <button
                  cButton
                  color="primary"
                  type="button"
                  variant="outline"
                  (click)="retrieveAtomFeatures()">
                  Get Atom
                </button>
              </c-input-group>

              <!-- Stored At (read-only) -->
              <c-input-group class="mb-3">
                <span cInputGroupText>Stored At</span>
                <span cInputGroupText>{{ atomForUpdate.properties.shellies.changeHistory }}</span>
              </c-input-group>

              <!-- Labels -->
              <c-input-group class="mb-3">
                <span cInputGroupText>Labels</span>
                <input
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.labels"/>
              </c-input-group>

              <!-- Bonds -->
              <c-input-group class="mb-3">
                <span cInputGroupText>Bonds</span>
                <input
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.bonds"/>
              </c-input-group>

              <!-- Title -->
              <c-input-group class="mb-3">
                <span cInputGroupText>Title</span>
                <input
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.properties.nuclearies.title"/>
              </c-input-group>

              <!-- Description -->
              <c-input-group class="mb-3">
                <span cInputGroupText>Description</span>
                <input
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.properties.nuclearies.description"/>
              </c-input-group>

              <!-- Content (with smart text/textarea switching) -->
              <c-input-group class="mb-3">
                <span cInputGroupText>Content</span>
                <input
                  *ngIf="!atomForUpdate.properties.nuclearies.content.includes('\n')"
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.properties.nuclearies.content"/>
                <textarea
                  *ngIf="atomForUpdate.properties.nuclearies.content.includes('\n')"
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.properties.nuclearies.content"
                  style="height: 150px;">
                </textarea>
              </c-input-group>

              <!-- Operation (with smart text/textarea switching) -->
              <c-input-group class="mb-3">
                <span cInputGroupText>Operation</span>
                <input
                  *ngIf="!(atomForUpdate.properties.nuclearies.operation ?? '').includes('\n')"
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.properties.nuclearies.operation"/>
                <textarea
                  *ngIf="(atomForUpdate.properties.nuclearies.operation ?? '').includes('\n')"
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.properties.nuclearies.operation"
                  style="height: 150px;">
                </textarea>
              </c-input-group>

              <!-- Constants (with smart text/textarea switching) -->
              <c-input-group class="mb-3">
                <span cInputGroupText>Constants</span>
                <input
                  *ngIf="!(atomForUpdate.properties.nuclearies.constants ?? '').includes('\n')"
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.properties.nuclearies.constants"/>
                <textarea
                  *ngIf="(atomForUpdate.properties.nuclearies.constants ?? '').includes('\n')"
                  cFormControl
                  placeholder=""
                  [(ngModel)]="atomForUpdate.properties.nuclearies.constants"
                  style="height: 150px;">
                </textarea>
              </c-input-group>

              <!-- Action Buttons -->
              <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                <button
                  cButton
                  color="primary"
                  type="button"
                  variant="outline"
                  (click)="updateAtomFeatures()">
                  Update Atom
                </button>

                <button
                  cButton
                  color="primary"
                  type="button"
                  variant="outline"
                  (click)="destroyAtoms()">
                  Destroy Atom
                </button>
              </div>
            </div>
          </div>
        </div>
      </ng-container>
    </div>

    <!-- Collapsed state content -->
    <div class="sidebar-collapsed-content" *ngIf="!isExpanded">
      <div class="d-flex flex-column align-items-center p-2">
        <!-- Icon-only button for atom creation -->
        <button type="button" class="btn btn-ghost-light btn-sm mb-2" title="Create Atom">
          <svg cIcon name="cilPlus" size="sm"></svg>
        </button>
      </div>
    </div>

  </c-sidebar>
</div>
